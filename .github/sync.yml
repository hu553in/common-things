group:
  # =============================================================================
  # GITHUB ACTIONS ONLY
  # =============================================================================

  - files:
      - source: templates/configs/dependabot.yml.njk
        dest: .github/dependabot.yml
        template:
          enable_github_actions: true
    repos: |
      hu553in/common-things
      hu553in/hu553in
      hu553in/skills

  # =============================================================================
  # BUN PROJECTS
  # =============================================================================

  - files:
      - source: templates/configs/dependabot.yml.njk
        dest: .github/dependabot.yml
        template:
          enable_github_actions: true
          enable_bun: true
    repos: |
      hu553in/ascii-profile-card
      hu553in/dota2-schedule-bot
      hu553in/flash-games
      hu553in/gh-workflow-dashboard
      hu553in/personal-website
      hu553in/relay
      hu553in/vrubel-museum-exhibitions

  - files:
      - source: templates/configs/dependabot.yml.njk
        dest: .github/dependabot.yml
        template:
          enable_github_actions: true
          enable_docker: true
          enable_bun: true
    repos: |
      hu553in/grooming-studio

  - files:
      - source: templates/configs/dependabot.yml.njk
        dest: .github/dependabot.yml
        template:
          enable_github_actions: true
          enable_docker_compose: true
          enable_bun: true
    repos: |
      hu553in/voomy

  - files:
      - source: files/configs/lefthook.bun.yml
        dest: lefthook.yml
    repos: |
      hu553in/ascii-profile-card
      hu553in/dota2-schedule-bot
      hu553in/flash-games
      hu553in/gh-workflow-dashboard
      hu553in/grooming-studio
      hu553in/personal-website
      hu553in/relay
      hu553in/voomy
      hu553in/vrubel-museum-exhibitions

  - files:
      - source: files/workflows/ci.yml.bun
        dest: .github/workflows/ci.yml
    repos: |
      hu553in/dota2-schedule-bot
      hu553in/gh-workflow-dashboard
      hu553in/personal-website
      hu553in/voomy
      hu553in/vrubel-museum-exhibitions

  # =============================================================================
  # RELEASE CONFIGURATION
  # =============================================================================

  - files:
      - source: files/configs/.release-it.yml
        dest: .release-it.yml
    repos: |
      hu553in/ascii-profile-card
      hu553in/relay

  # =============================================================================
  # PYTHON PROJECTS
  # =============================================================================

  - files:
      - source: templates/configs/dependabot.yml.njk
        dest: .github/dependabot.yml
        template:
          enable_github_actions: true
          enable_docker: true
          enable_uv: true
    repos: |
      hu553in/grooming-studio-chat-helper
      hu553in/keenetic-vpn-switcher

  - files:
      - source: templates/configs/dependabot.yml.njk
        dest: .github/dependabot.yml
        template:
          enable_github_actions: true
          enable_docker: true
          enable_docker_compose: true
          enable_uv: true
    repos: |
      hu553in/spa-crawler

  - files:
      - source: templates/configs/dependabot.yml.njk
        dest: .github/dependabot.yml
        template:
          enable_github_actions: true
          enable_uv: true
    repos: |
      hu553in/dbeaver-gcloud-free
      hu553in/kinescope-io-loader
      hu553in/vod-recovery

  - files:
      - source: templates/configs/dependabot.yml.njk
        dest: .github/dependabot.yml
        template:
          enable_github_actions: true
          enable_docker: true
          enable_uv: true
          docker_directories:
            - /src/tizen_tool/resources
    repos: |
      hu553in/tizen-tool

  - files:
      - source: files/workflows/ci.yml.python
        dest: .github/workflows/ci.yml
    repos: |
      hu553in/dbeaver-gcloud-free
      hu553in/kinescope-io-loader
      hu553in/vod-recovery

  - files:
      - source: files/workflows/ci.yml.python-docker
        dest: .github/workflows/ci.yml
    repos: |
      hu553in/grooming-studio-chat-helper
      hu553in/keenetic-vpn-switcher

  - files:
      - source: files/configs/.dockerignore.python
        dest: .dockerignore
    repos: |
      hu553in/grooming-studio-chat-helper
      hu553in/keenetic-vpn-switcher

  # =============================================================================
  # GO PROJECTS
  # =============================================================================

  - files:
      - source: templates/configs/dependabot.yml.njk
        dest: .github/dependabot.yml
        template:
          enable_github_actions: true
          enable_docker: true
          enable_gomod: true
    repos: |
      hu553in/telekilogram

  - files:
      - source: templates/configs/dependabot.yml.njk
        dest: .github/dependabot.yml
        template:
          enable_github_actions: true
          enable_docker: true
          enable_docker_compose: true
          enable_gomod: true
    repos: |
      hu553in/tempstream

  - files:
      - source: files/configs/.golangci.yaml
        dest: .golangci.yaml
    repos: |
      hu553in/telekilogram
      hu553in/tempstream

  - files:
      - source: files/workflows/ci.yml.go-docker
        dest: .github/workflows/ci.yml
    repos: |
      hu553in/telekilogram
      hu553in/tempstream

  - files:
      - source: files/configs/.dockerignore.go
        dest: .dockerignore
    repos: |
      hu553in/telekilogram
      hu553in/tempstream

  # =============================================================================
  # GRADLE PROJECTS
  # =============================================================================

  - files:
      - source: templates/configs/dependabot.yml.njk
        dest: .github/dependabot.yml
        template:
          enable_github_actions: true
          enable_docker_compose: true
          enable_gradle: true
    repos: |
      hu553in/invites-keycloak

  - files:
      - source: templates/configs/dependabot.yml.njk
        dest: .github/dependabot.yml
        template:
          enable_github_actions: true
          enable_docker: true
          enable_gradle: true
    repos: |
      hu553in/na-omsk-bot

  - files:
      - source: files/configs/detekt.yml
        dest: config/detekt.yml
    repos: |
      hu553in/invites-keycloak
      hu553in/na-omsk-bot

  - files:
      - source: files/configs/gradle.properties
        dest: gradle.properties
    repos: |
      hu553in/invites-keycloak
      hu553in/na-omsk-bot

  # =============================================================================
  # INFRASTRUCTURE
  # =============================================================================

  - files:
      - source: templates/configs/dependabot.yml.njk
        dest: .github/dependabot.yml
        template:
          enable_github_actions: true
          enable_docker_compose: true
          docker_compose_directories:
            - /stacks/beget
            - /stacks/beget-micopes
            - /stacks/hostvds-lv
            - /stacks/spacecore-nl
    repos: |
      hu553in/single-deployment

  # =============================================================================
  # RUNTIME VERSION UPDATES
  # =============================================================================

  - files:
      - source: files/configs/renovate.python.json
        dest: renovate.json
    repos: |
      hu553in/dbeaver-gcloud-free
      hu553in/grooming-studio-chat-helper
      hu553in/keenetic-vpn-switcher
      hu553in/kinescope-io-loader
      hu553in/spa-crawler
      hu553in/tizen-tool
      hu553in/vod-recovery

  - files:
      - source: files/configs/renovate.go.json
        dest: renovate.json
    repos: |
      hu553in/telekilogram
      hu553in/tempstream

  # =============================================================================
  # FORMATTER CONFIGURATION
  # =============================================================================

  - files:
      - source: files/configs/.prettierrc.json
        dest: .prettierrc.json
    repos: |
      hu553in/common-things
      hu553in/dbeaver-gcloud-free
      hu553in/grooming-studio-chat-helper
      hu553in/hu553in
      hu553in/invites-keycloak
      hu553in/keenetic-vpn-switcher
      hu553in/kinescope-io-loader
      hu553in/na-omsk-bot
      hu553in/single-deployment
      hu553in/skills
      hu553in/spa-crawler
      hu553in/telekilogram
      hu553in/tempstream
      hu553in/tizen-tool
      hu553in/vod-recovery

  # =============================================================================
  # PREK HOOKS
  # =============================================================================

  - files:
      - source: files/configs/prek.toml
        dest: prek.toml
    repos: |
      hu553in/dbeaver-gcloud-free
      hu553in/grooming-studio-chat-helper
      hu553in/invites-keycloak
      hu553in/keenetic-vpn-switcher
      hu553in/kinescope-io-loader
      hu553in/na-omsk-bot
      hu553in/spa-crawler
      hu553in/telekilogram
      hu553in/tempstream
      hu553in/tizen-tool
      hu553in/vod-recovery

  # =============================================================================
  # NATIVE GIT HOOKS
  # =============================================================================

  - files:
      - source: files/configs/.gitconfig
        dest: .gitconfig
    repos: |
      hu553in/common-things
      hu553in/hu553in
      hu553in/single-deployment
      hu553in/skills

  # =============================================================================
  # BASE CONFIGURATION
  # =============================================================================

  - files:
      - source: files/configs/.editorconfig
        dest: .editorconfig
      - source: files/configs/.gitattributes
        dest: .gitattributes
      - source: files/docs/AGENTS.md
        dest: AGENTS.md
      - source: files/docs/CLAUDE.md
        dest: CLAUDE.md
    repos: |
      hu553in/ascii-profile-card
      hu553in/common-things
      hu553in/dbeaver-gcloud-free
      hu553in/dota2-schedule-bot
      hu553in/flash-games
      hu553in/gh-workflow-dashboard
      hu553in/grooming-studio
      hu553in/grooming-studio-chat-helper
      hu553in/hu553in
      hu553in/invites-keycloak
      hu553in/keenetic-vpn-switcher
      hu553in/kinescope-io-loader
      hu553in/na-omsk-bot
      hu553in/personal-website
      hu553in/relay
      hu553in/single-deployment
      hu553in/skills
      hu553in/spa-crawler
      hu553in/telekilogram
      hu553in/tempstream
      hu553in/tizen-tool
      hu553in/vod-recovery
      hu553in/voomy
      hu553in/vrubel-museum-exhibitions
