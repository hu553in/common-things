name: Sync

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: step-security/repo-file-sync-action@v1
        with:
          GH_PAT: ${{ secrets.GH_PAT }}
