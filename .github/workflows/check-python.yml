name: Check Python project

on:
  workflow_call:

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@v7
      - uses: oven-sh/setup-bun@v2
      - run: make install-deps
      - run: make check
