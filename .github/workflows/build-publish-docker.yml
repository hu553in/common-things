name: Build Docker image and publish to GHCR

on:
  workflow_call:
    inputs:
      image:
        required: true
        type: string
      context:
        required: false
        type: string
        default: .
      file:
        required: false
        type: string
        default: Dockerfile
      build_args:
        required: false
        type: string
        default: ''
      runs-on:
        required: false
        type: string
        default: ubuntu-latest
    outputs:
      digest:
        value: ${{ jobs.publish.outputs.digest }}

jobs:
  publish:
    runs-on: ${{ inputs.runs-on }}
    outputs:
      digest: ${{ steps.build.outputs.digest }}
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v6
        id: meta
        with:
          images: ${{ inputs.image }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha
          labels: |
            org.opencontainers.image.authors=Ruslan Khasanshin
      - id: build
        uses: docker/build-push-action@v7
        with:
          context: ${{ inputs.context }}
          file: ${{ inputs.file }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: mode=max
          sbom: true
          cache-from: type=gha,scope=${{ inputs.file }}
          cache-to: type=gha,scope=${{ inputs.file }},mode=max
          build-args: ${{ inputs.build_args }}
      - uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ inputs.image }}@${{ steps.build.outputs.digest }}
          format: table
          exit-code: '1'
          ignore-unfixed: true
          severity: HIGH,CRITICAL
          scanners: vuln
